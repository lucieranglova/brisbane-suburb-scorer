<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brisbane Suburb Scorer</title>
<meta name="description" content="Find your perfect Brisbane neighbourhood — ranked by rent, commute, wildlife, lifestyle and more.">
<meta property="og:title" content="Brisbane Suburb Scorer">
<meta property="og:description" content="Find your perfect Brisbane neighbourhood.">
<meta property="og:image" content="assets/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --green:#1a7a5e;--green-l:#e6f4f0;
  --amber:#c97a2a;--amber-l:#fdf3e6;
  --blue:#2563a8;--blue-l:#e8f0fa;
  --coral:#c4442a;--coral-l:#fdecea;
  --text:#1a1a18;--muted:#6b6b65;--hint:#a0a09a;
  --border:rgba(0,0,0,.09);--bg:#f7f5f0;--surface:#fff;
  --r:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* Loading state */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:1000;transition:opacity .3s;}
#loading.hidden{opacity:0;pointer-events:none;}
.spinner{width:32px;height:32px;border:2.5px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:14px;color:var(--muted);}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:.85rem 1.75rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-mark{width:34px;height:34px;background:var(--green);border-radius:9px;display:flex;align-items:center;justify-content:center;}
.logo-title{font-family:'DM Serif Display',serif;font-size:17px;color:var(--text);}
.logo-sub{font-size:11px;color:var(--hint);letter-spacing:.04em;}
.hbtn{display:flex;align-items:center;gap:6px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--muted);background:transparent;border:1px solid var(--border);border-radius:8px;padding:6px 13px;cursor:pointer;transition:background .15s;}
.hbtn:hover{background:var(--bg);color:var(--text);}

.app{display:grid;grid-template-columns:310px 1fr;min-height:calc(100vh - 57px);}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:1.25rem;display:flex;flex-direction:column;gap:1.25rem;overflow-y:auto;max-height:calc(100vh - 57px);}
.main{padding:1.5rem 1.75rem;display:flex;flex-direction:column;gap:1rem;overflow-y:auto;max-height:calc(100vh - 57px);}

.sec-title{font-size:10px;font-weight:500;letter-spacing:.1em;color:var(--hint);text-transform:uppercase;margin-bottom:.6rem;}
.divider{height:1px;background:var(--border);}

.addr-row{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;}
.addr-label{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;}
.addr-label svg{width:13px;height:13px;flex-shrink:0;}
.addr-input-wrap{display:flex;gap:6px;position:relative;}
.addr-input{flex:1;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 10px;outline:none;transition:border .15s;}
.addr-input:focus{border-color:var(--green);}
.addr-input::placeholder{color:var(--hint);}
.addr-btn{font-size:12px;font-family:'DM Sans',sans-serif;background:var(--green);color:#fff;border:none;border-radius:8px;padding:7px 11px;cursor:pointer;white-space:nowrap;transition:opacity .15s;}
.addr-btn:hover{opacity:.85;}
.addr-btn:disabled{opacity:.45;cursor:default;}
.addr-status{font-size:11px;min-height:16px;}
.addr-status.ok{color:var(--green);}
.addr-status.err{color:var(--coral);}
.addr-status.loading{color:var(--hint);}
.autocomplete-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:300;overflow:hidden;display:none;}
.autocomplete-list.open{display:block;}
.ac-item{padding:8px 12px;font-size:13px;cursor:pointer;color:var(--text);transition:background .1s;}
.ac-item:hover{background:var(--bg);}

.commute-weight-row{display:flex;align-items:center;gap:8px;margin-top:4px;}
.commute-weight-label{font-size:12px;color:var(--muted);flex:1;}
.commute-weight-val{font-size:12px;font-weight:500;color:var(--text);min-width:18px;text-align:right;}

input[type="range"]{-webkit-appearance:none;appearance:none;width:100%;height:3px;background:#e0ddd8;border-radius:2px;outline:none;cursor:pointer;}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--green);cursor:pointer;transition:transform .1s;}
input[type="range"]::-webkit-slider-thumb:hover{transform:scale(1.25);}

.criteria-list{display:flex;flex-direction:column;gap:1rem;}
.crit-header{display:flex;justify-content:space-between;margin-bottom:6px;}
.crit-name{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:6px;}
.crit-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.crit-val{font-size:13px;font-weight:500;color:var(--text);}

.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.stat-card{background:var(--bg);border-radius:10px;padding:10px 12px;}
.stat-label{font-size:11px;color:var(--hint);margin-bottom:3px;}
.stat-val{font-size:17px;font-weight:500;color:var(--text);}

.filter-row{display:flex;gap:7px;flex-wrap:wrap;}
.chip{font-size:12px;font-family:'DM Sans',sans-serif;padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .15s;}
.chip:hover{border-color:var(--green);color:var(--green);}
.chip.active{background:var(--green);border-color:var(--green);color:#fff;}

.results-title{font-family:'DM Serif Display',serif;font-size:22px;}
.results-count{font-size:13px;color:var(--hint);margin-top:2px;}

.cards{display:flex;flex-direction:column;gap:10px;}
.card-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color .15s,box-shadow .15s;}
.card-wrap:hover{box-shadow:0 2px 14px rgba(0,0,0,.07);}
.card-wrap.is-top{border-color:var(--green);}
.card-wrap.is-open{box-shadow:0 4px 24px rgba(0,0,0,.1);}

.suburb-card{padding:1rem 1.25rem;display:grid;grid-template-columns:46px 1fr auto;gap:14px;align-items:center;cursor:pointer;user-select:none;}
.rank-badge{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:500;flex-shrink:0;}
.rb1{background:var(--green-l);color:var(--green);}
.rb2,.rb3{background:#f0efe9;color:var(--muted);}
.rbn{background:#f0efe9;color:var(--hint);}

.card-top{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.card-name{font-size:15px;font-weight:500;}
.best-pill{font-size:10px;font-weight:500;letter-spacing:.05em;background:var(--green-l);color:var(--green);padding:2px 8px;border-radius:20px;text-transform:uppercase;}
.card-tags{display:flex;gap:5px;flex-wrap:wrap;}
.tag{font-size:11px;padding:2px 8px;border-radius:20px;}
.tg{background:var(--green-l);color:#0f5e44;}
.ta{background:var(--amber-l);color:#7a4a10;}
.tb{background:var(--blue-l);color:#1a4a80;}
.tc{background:var(--coral-l);color:#8a2a18;}
.tn{background:#f0efe9;color:var(--muted);}

.score-col{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.score-num{font-family:'DM Serif Display',serif;font-size:28px;line-height:1;color:var(--text);}
.bar-track{width:70px;height:3px;background:#e0ddd8;border-radius:2px;}
.bar-fill{height:3px;border-radius:2px;background:var(--green);transition:width .4s ease;}
.score-lbl{font-size:10px;color:var(--hint);letter-spacing:.04em;}

.detail{display:none;border-top:1px solid var(--border);background:var(--bg);}
.detail.open{display:block;}
.detail-map{width:100%;height:210px;border-bottom:1px solid var(--border);}
.detail-body{padding:1rem 1.25rem;display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.dm-label{font-size:11px;color:var(--hint);margin-bottom:3px;}
.dm-val{font-size:14px;font-weight:500;color:var(--text);}
.dm-link{font-size:12px;color:var(--green);text-decoration:none;display:inline-flex;align-items:center;gap:3px;}
.dm-link:hover{text-decoration:underline;}

.detail-section{padding:0 1.25rem .9rem;display:flex;gap:7px;flex-wrap:wrap;}
.detail-section-title{font-size:11px;color:var(--hint);width:100%;margin-bottom:4px;letter-spacing:.04em;}

.wl-pill{display:flex;align-items:center;gap:6px;font-size:12px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 10px;color:var(--muted);}
.wl-pill .emoji{font-size:14px;line-height:1;}
.wl-pill.danger{border-color:rgba(196,68,42,.25);}
.ac{font-size:10px;font-weight:500;padding:1px 7px;border-radius:10px;margin-left:1px;}
.ac-high{background:var(--green-l);color:var(--green);}
.ac-med{background:var(--amber-l);color:var(--amber);}
.ac-low{background:#f0efe9;color:var(--hint);}
.wl-pill.danger .ac-high{background:var(--coral-l);color:var(--coral);}
.wl-pill.danger .ac-med{background:#fdf3e6;color:#c97a2a;}

.commute-pill{font-size:12px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 11px;color:var(--muted);display:flex;align-items:center;gap:5px;}
.commute-pill strong{color:var(--text);font-weight:500;}

.not-expected{border-top:1px solid var(--border);padding:.75rem 1.25rem;}
.not-expected-title{font-size:11px;color:var(--hint);margin-bottom:6px;letter-spacing:.04em;}
.not-expected-item{display:flex;align-items:flex-start;gap:6px;font-size:11px;color:var(--hint);margin-bottom:4px;line-height:1.5;}
.not-expected-item .emoji{font-size:13px;flex-shrink:0;}

.leaflet-container{font-family:'DM Sans',sans-serif;}
.leaflet-control-attribution{font-size:9px!important;}
</style>
</head>
<body>

<!-- Loading overlay -->
<div id="loading">
  <div class="spinner"></div>
  <span class="loading-text">Loading suburb data…</span>
</div>

<header>
  <div class="logo">
    <div class="logo-mark">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="white" stroke-width="1.6">
        <path d="M9 2C6.2 2 4 4.3 4 7.1c0 3.8 5 8.9 5 8.9s5-5.1 5-8.9C14 4.3 11.8 2 9 2z"/>
        <circle cx="9" cy="7" r="1.8"/>
      </svg>
    </div>
    <div>
      <div class="logo-title">Brisbane Suburb Scorer</div>
      <div class="logo-sub">Find your perfect neighbourhood</div>
    </div>
  </div>
  <button class="hbtn" onclick="shareUrl()">
    <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7.5 2h3.5v3.5M11 2l-7 7M4.5 2H2a1 1 0 00-1 1v8a1 1 0 001 1h8a1 1 0 001-1V8"/></svg>
    Share settings
  </button>
</header>

<div class="app">
  <aside class="sidebar">
    <div>
      <div class="sec-title">Commute destinations</div>
      <div class="addr-row">
        <label class="addr-label">
          <svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="1.5" y="4" width="10" height="8" rx="1"/><path d="M4 4V3a2 2 0 014 0v1"/></svg>
          Workplace address
        </label>
        <div class="addr-input-wrap">
          <input class="addr-input" id="inp-work" type="text" placeholder="e.g. 123 Queen St, Brisbane" autocomplete="off"
            oninput="onAddrInput('work')" onkeydown="onAddrKey(event,'work')">
          <button class="addr-btn" id="btn-work" onclick="geocode('work')">Search</button>
          <div class="autocomplete-list" id="ac-work"></div>
        </div>
        <span class="addr-status" id="st-work"></span>
      </div>
      <div class="addr-row">
        <label class="addr-label">
          <svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M6.5 1L1 4l5.5 3 5.5-3L6.5 1z"/><path d="M1 4v5M4 5.5v4a5 5 0 005 0V5.5"/></svg>
          School / uni address
        </label>
        <div class="addr-input-wrap">
          <input class="addr-input" id="inp-school" type="text" placeholder="e.g. UQ St Lucia, Brisbane" autocomplete="off"
            oninput="onAddrInput('school')" onkeydown="onAddrKey(event,'school')">
          <button class="addr-btn" id="btn-school" onclick="geocode('school')">Search</button>
          <div class="autocomplete-list" id="ac-school"></div>
        </div>
        <span class="addr-status" id="st-school"></span>
      </div>
      <div class="commute-weight-row">
        <span class="commute-weight-label">Commute priority</span>
        <span class="commute-weight-val" id="cv-commute">7</span>
      </div>
      <input type="range" min="0" max="10" value="7" step="1"
        oninput="weights.commute=+this.value;document.getElementById('cv-commute').textContent=this.value;render()">
    </div>

    <div class="divider"></div>

    <div>
      <div class="sec-title">Your priorities</div>
      <div class="criteria-list" id="sliders"></div>
    </div>

    <div class="divider"></div>

    <div>
      <div class="sec-title">Summary</div>
      <div class="stats-row">
        <div class="stat-card"><div class="stat-label">Suburbs</div><div class="stat-val" id="st-n">—</div></div>
        <div class="stat-card"><div class="stat-label">Top score</div><div class="stat-val" id="st-top">—</div></div>
        <div class="stat-card"><div class="stat-label">Best commute</div><div class="stat-val" id="st-commute">—</div></div>
        <div class="stat-card"><div class="stat-label">Most wildlife</div><div class="stat-val" id="st-wildlife">—</div></div>
      </div>
    </div>
  </aside>

  <main class="main">
    <div>
      <div class="results-title">Ranked suburbs</div>
      <div class="results-count" id="result-count"></div>
    </div>
    <div class="filter-row">
      <button class="chip active" onclick="setFilter('all',this)">All</button>
      <button class="chip" onclick="setFilter('beach',this)">Near beach</button>
      <button class="chip" onclick="setFilter('affordable',this)">Affordable</button>
      <button class="chip" onclick="setFilter('transit',this)">Great transit</button>
      <button class="chip" onclick="setFilter('wildlife',this)">Wildlife hotspot</button>
    </div>
    <div class="cards" id="cards"></div>
  </main>
</div>

<script>
/* ── App state ── */
let SUBURBS = [], WILDLIFE = {}, CRITERIA = [];
const weights = { commute: 7 };
let activeFilter = 'all';
const maps = {};
const destinations = { work: null, school: null };
const acTimers = {};

/* ── Load data ── */
async function loadData() {
  const [suburbs, wildlife, criteria] = await Promise.all([
    fetch('data/suburbs.json').then(r => r.json()),
    fetch('data/wildlife.json').then(r => r.json()),
    fetch('data/criteria.json').then(r => r.json()),
  ]);
  SUBURBS = suburbs;
  WILDLIFE = wildlife;
  CRITERIA = criteria;
  CRITERIA.forEach(c => weights[c.id] = c.default);
  loadFromUrl();
  buildSliders();
  render();
  document.getElementById('loading').classList.add('hidden');
}

/* ── Geocoding (Nominatim) ── */
async function geocode(which) {
  const input = document.getElementById('inp-' + which);
  const status = document.getElementById('st-' + which);
  const btn = document.getElementById('btn-' + which);
  const q = input.value.trim();
  if (!q) return;
  btn.disabled = true;
  status.className = 'addr-status loading';
  status.textContent = 'Searching…';
  closeAC(which);
  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&countrycodes=au&limit=1`,
      { headers: { 'Accept-Language': 'en' } }
    );
    const data = await res.json();
    if (!data.length) throw new Error();
    const { lat, lon, display_name } = data[0];
    destinations[which] = { lat: +lat, lng: +lon, label: display_name.split(',').slice(0, 2).join(', ') };
    status.className = 'addr-status ok';
    status.textContent = '✓ ' + destinations[which].label;
    input.value = destinations[which].label;
    render();
  } catch {
    destinations[which] = null;
    status.className = 'addr-status err';
    status.textContent = 'Address not found — try a more specific address';
    render();
  } finally {
    btn.disabled = false;
  }
}

async function fetchSuggestions(which, q) {
  if (q.length < 3) { closeAC(which); return; }
  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&countrycodes=au&limit=5`,
      { headers: { 'Accept-Language': 'en' } }
    );
    const data = await res.json();
    showAC(which, data);
  } catch { closeAC(which); }
}

function onAddrInput(which) {
  const q = document.getElementById('inp-' + which).value.trim();
  clearTimeout(acTimers[which]);
  acTimers[which] = setTimeout(() => fetchSuggestions(which, q), 350);
}

function onAddrKey(e, which) {
  if (e.key === 'Enter') { e.preventDefault(); geocode(which); }
  if (e.key === 'Escape') closeAC(which);
}

function showAC(which, results) {
  const list = document.getElementById('ac-' + which);
  if (!results.length) { closeAC(which); return; }
  list._results = results;
  list.innerHTML = results.map((r, i) =>
    `<div class="ac-item" onclick="pickAC('${which}',${i})">${r.display_name.split(',').slice(0, 3).join(', ')}</div>`
  ).join('');
  list.classList.add('open');
}

function closeAC(which) {
  const l = document.getElementById('ac-' + which);
  l.classList.remove('open');
  l.innerHTML = '';
}

function pickAC(which, idx) {
  const list = document.getElementById('ac-' + which);
  const r = list._results[idx];
  const short = r.display_name.split(',').slice(0, 3).join(', ');
  document.getElementById('inp-' + which).value = short;
  closeAC(which);
  destinations[which] = { lat: +r.lat, lng: +r.lon, label: short };
  document.getElementById('st-' + which).className = 'addr-status ok';
  document.getElementById('st-' + which).textContent = '✓ ' + short;
  render();
}

document.addEventListener('click', e => {
  ['work', 'school'].forEach(w => {
    if (!document.getElementById('inp-' + w).contains(e.target) &&
        !document.getElementById('ac-' + w).contains(e.target)) closeAC(w);
  });
});

/* ── Commute ── */
function haversineKm(lat1, lng1, lat2, lng2) {
  const R = 6371, dLat = (lat2 - lat1) * Math.PI / 180, dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function commuteScore(s) {
  const dests = [destinations.work, destinations.school].filter(Boolean);
  if (!dests.length) return 5;
  const avgKm = dests.reduce((sum, d) => sum + haversineKm(s.lat, s.lng, d.lat, d.lng), 0) / dests.length;
  return Math.max(0, Math.min(10, Math.round(10 - avgKm / 3)));
}

function commuteDistances(s) {
  return [
    destinations.work   ? { label: destinations.work.label.split(',')[0],   km: haversineKm(s.lat, s.lng, destinations.work.lat, destinations.work.lng) }   : null,
    destinations.school ? { label: destinations.school.label.split(',')[0], km: haversineKm(s.lat, s.lng, destinations.school.lat, destinations.school.lng) } : null,
  ].filter(Boolean);
}

/* ── Sliders ── */
function buildSliders() {
  const container = document.getElementById('sliders');
  CRITERIA.filter(c => c.id !== 'commute').forEach(cr => {
    const d = document.createElement('div');
    d.innerHTML = `
      <div class="crit-header">
        <span class="crit-name"><span class="crit-dot" style="background:${cr.color}"></span>${cr.label}</span>
        <span class="crit-val" id="cv-${cr.id}">${cr.default}</span>
      </div>
      <input type="range" min="0" max="10" value="${cr.default}" step="1"
        oninput="weights['${cr.id}']=+this.value;document.getElementById('cv-${cr.id}').textContent=this.value;render()">
    `;
    container.appendChild(d);
  });
}

/* ── Scoring ── */
function totalScore(s) {
  const cs = commuteScore(s);
  const allIds = [...CRITERIA.map(c => c.id)];
  const wTotal = allIds.reduce((sum, id) => sum + (weights[id] || 0), 0) || 1;
  const raw = CRITERIA.filter(c => c.id !== 'commute').reduce((sum, c) => sum + (s.scores[c.id] || 0) * (weights[c.id] || 0), 0)
            + cs * (weights.commute || 0);
  return Math.round(raw / (10 * wTotal) * 100);
}

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  render();
}

function filterList() {
  if (activeFilter === 'beach')      return SUBURBS.filter(s => s.scores.beach >= 7);
  if (activeFilter === 'affordable') return SUBURBS.filter(s => s.scores.rent >= 7);
  if (activeFilter === 'transit')    return SUBURBS.filter(s => s.scores.transit >= 8);
  if (activeFilter === 'wildlife')   return SUBURBS.filter(s => s.scores.wildlife >= 7);
  return SUBURBS;
}

/* ── Render ── */
function render() {
  const ranked = filterList().map(s => ({ ...s, sc: totalScore(s) })).sort((a, b) => b.sc - a.sc);
  const container = document.getElementById('cards');
  container.innerHTML = '';

  ranked.forEach((s, i) => {
    const isTop = i === 0;
    const rb = i === 0 ? 'rb1' : i === 1 ? 'rb2' : i === 2 ? 'rb3' : 'rbn';
    const tags = s.tags.map(([t, c]) => `<span class="tag ${c}">${t}</span>`).join('');
    const mapId = 'map-' + s.name.replace(/[\s&]/g, '-');
    const detId = 'det-' + mapId;

    const wlData = WILDLIFE[s.name] || [];
    const wlHtml = wlData.map(a =>
      `<div class="wl-pill${a.danger ? ' danger' : ''}">
        <span class="emoji">${a.emoji}</span>${a.name}
        <span class="ac ac-${a.chance}">${a.chance}</span>
      </div>`
    ).join('');

    const notExpected = (WILDLIFE._not_in_brisbane || []).map(a =>
      `<div class="not-expected-item">
        <span class="emoji">${a.emoji}</span>
        <span><strong style="color:var(--muted)">${a.name}:</strong> ${a.note}</span>
      </div>`
    ).join('');

    const dists = commuteDistances(s);
    const commuteHtml = dists.length ? `
      <div class="detail-section">
        <div class="detail-section-title">Distance to your destinations</div>
        ${dists.map(d => `<div class="commute-pill"><strong>${d.km.toFixed(1)} km</strong> to ${d.label}</div>`).join('')}
      </div>` : '';

    const wrap = document.createElement('div');
    wrap.className = `card-wrap${isTop ? ' is-top' : ''}`;
    wrap.innerHTML = `
      <div class="suburb-card" onclick="toggleDetail('${detId}','${mapId}',${s.lat},${s.lng},'${s.name.replace(/'/g, "\\'")}')">
        <div class="rank-badge ${rb}">${i + 1}</div>
        <div>
          <div class="card-top">
            <span class="card-name">${s.name}</span>
            ${isTop ? '<span class="best-pill">Best match</span>' : ''}
          </div>
          <div class="card-tags">${tags}</div>
        </div>
        <div class="score-col">
          <span class="score-num">${s.sc}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${s.sc}%"></div></div>
          <span class="score-lbl">score</span>
        </div>
      </div>
      <div class="detail" id="${detId}">
        <div class="detail-map" id="${mapId}"></div>
        <div class="detail-body">
          <div><div class="dm-label">Avg. rent</div><div class="dm-val">${s.info.avgRent}</div></div>
          <div><div class="dm-label">CBD by transit</div><div class="dm-val">${s.info.cbdMin}</div></div>
          <div><div class="dm-label">Nearest beach</div><div class="dm-val">${s.info.beachKm}</div></div>
          <div><div class="dm-label">Listings</div><div class="dm-val">
            <a class="dm-link" href="${s.url}" target="_blank">Domain.com.au
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5.5 2h2.5v2.5M8 2L3 7M3.5 2H2a1 1 0 00-1 1v5a1 1 0 001 1h5a1 1 0 001-1V6.5"/></svg>
            </a>
          </div></div>
        </div>
        ${commuteHtml}
        <div class="detail-section" style="flex-direction:column;gap:0;">
          <div class="detail-section-title" style="margin-bottom:8px;">
            Wildlife from your list you might spot here
            <span style="margin-left:8px;font-size:10px;">
              <span style="display:inline-flex;align-items:center;gap:3px;margin-right:8px;"><span style="width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block"></span>high</span>
              <span style="display:inline-flex;align-items:center;gap:3px;margin-right:8px;"><span style="width:8px;height:8px;border-radius:50%;background:var(--amber);display:inline-block"></span>med</span>
              <span style="display:inline-flex;align-items:center;gap:3px;margin-right:8px;"><span style="width:8px;height:8px;border-radius:50%;background:#ccc;display:inline-block"></span>low</span>
              <span style="color:var(--coral);">red border = dangerous</span>
            </span>
          </div>
          <div style="display:flex;gap:7px;flex-wrap:wrap;">${wlHtml}</div>
        </div>
        <div class="not-expected">
          <div class="not-expected-title">NOT EXPECTED IN BRISBANE SUBURBS</div>
          ${notExpected}
        </div>
      </div>
    `;
    container.appendChild(wrap);
  });

  document.getElementById('st-n').textContent = ranked.length;
  document.getElementById('st-top').textContent = ranked[0]?.sc ?? '—';
  const bestWL = [...ranked].sort((a, b) => b.scores.wildlife - a.scores.wildlife)[0];
  document.getElementById('st-wildlife').textContent = bestWL ? bestWL.name.split(' ')[0] : '—';
  const bestC = [...ranked].sort((a, b) => commuteScore(b) - commuteScore(a))[0];
  document.getElementById('st-commute').textContent = bestC ? bestC.name.split(' ')[0] : '—';
  document.getElementById('result-count').textContent = `${ranked.length} suburb${ranked.length !== 1 ? 's' : ''} ranked`;
}

/* ── Map ── */
function toggleDetail(detId, mapId, lat, lng, name) {
  const det  = document.getElementById(detId);
  const wrap = det.closest('.card-wrap');
  const opening = !det.classList.contains('open');
  det.classList.toggle('open');
  wrap.classList.toggle('is-open');

  if (opening && !maps[mapId]) {
    setTimeout(() => {
      const m = L.map(mapId, { zoomControl: true, attributionControl: true }).setView([lat, lng], 14);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>', maxZoom: 18
      }).addTo(m);

      const subIcon = L.divIcon({ className: '', html: `<div style="width:14px;height:14px;border-radius:50%;background:#1a7a5e;border:2.5px solid white;box-shadow:0 1px 5px rgba(0,0,0,.35)"></div>`, iconSize: [14, 14], iconAnchor: [7, 7] });
      L.marker([lat, lng], { icon: subIcon }).addTo(m).bindPopup(`<b>${name}</b>`);

      const destIcon = L.divIcon({ className: '', html: `<div style="width:12px;height:12px;border-radius:50%;background:#c4442a;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,.3)"></div>`, iconSize: [12, 12], iconAnchor: [6, 6] });
      const bounds = [[lat, lng]];
      [destinations.work, destinations.school].filter(Boolean).forEach(d => {
        L.marker([d.lat, d.lng], { icon: destIcon }).addTo(m).bindPopup(`<b>${d.label.split(',')[0]}</b>`);
        L.polyline([[lat, lng], [d.lat, d.lng]], { color: '#1a7a5e', weight: 1.5, dashArray: '5,5', opacity: .6 }).addTo(m);
        bounds.push([d.lat, d.lng]);
      });
      if (bounds.length > 1) m.fitBounds(bounds, { padding: [24, 24] });
      maps[mapId] = m;
    }, 50);
  }
}

/* ── Share ── */
function shareUrl() {
  const p = new URLSearchParams();
  CRITERIA.forEach(c => p.set(c.id, weights[c.id]));
  navigator.clipboard.writeText(location.href.split('?')[0] + '?' + p).then(() => {
    const b = document.querySelector('.hbtn'), orig = b.innerHTML;
    b.textContent = 'Link copied!';
    setTimeout(() => b.innerHTML = orig, 2000);
  });
}

function loadFromUrl() {
  const p = new URLSearchParams(location.search);
  CRITERIA.forEach(c => {
    if (p.has(c.id)) weights[c.id] = Math.min(10, Math.max(0, +p.get(c.id) || c.default));
  });
}

/* ── Init ── */
loadData().catch(err => {
  document.getElementById('loading').innerHTML =
    `<span style="color:var(--coral);font-size:14px;">Failed to load data. Are you running this from a web server?</span>`;
  console.error(err);
});
</script>
</body>
</html>
